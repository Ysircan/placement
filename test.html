<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Diagnostic</title>
  <style>
    :root{
      --yellow:#ffd43b;
      --border:#111;
      --bg:#f3f4f6;
      --text:#111;
      --muted:#4b5563;
      --white:#ffffff;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:720px;
      padding:40px;
      margin:0 auto;
    }

    .card{
      background:var(--white);
      padding:50px;
      border:2px solid var(--border);
      border-radius:18px;
      box-shadow:6px 6px 0 var(--border);
    }

    .step{
      display:inline-block;
      font-size:14px;
      font-weight:600;
      color:var(--muted);
      margin-bottom:18px;
    }

    .title{
      font-size:34px;
      font-weight:700;
      line-height:1.2;
      margin:0 0 16px;
      color:var(--text);
    }

    .desc{
      font-size:18px;
      color:var(--muted);
      margin:0 0 30px;
      line-height:1.6;
      max-width:520px;
    }

    .inputWrap{
      margin-bottom:34px;
    }

    .input{
      width:100%;
      height:60px;
      border:2px solid var(--border);
      border-radius:14px;
      padding:0 18px;
      font-size:17px;
      color:var(--text);
      background:#fff;
      outline:none;
      box-shadow:none;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .input::placeholder{
      color:#9ca3af;
    }

    .input:hover,
    .input:focus{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 var(--border);
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .backBtn,
    .btn{
      border:2px solid var(--border);
      border-radius:14px;
      cursor:pointer;
      font-weight:600;
      transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
      box-shadow:none;
      color:var(--text);
    }

    .backBtn{
      background:#fff;
      padding:12px 22px;
      font-size:16px;
    }

    .btn{
      background:var(--yellow);
      padding:14px 36px;
      font-size:18px;
    }

    .backBtn:hover,
    .btn:hover{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 var(--border);
    }

    .backBtn:active,
    .btn:active{
      transform:translate(1px,1px);
      box-shadow:2px 2px 0 var(--border);
    }

    @media (max-width:640px){
      .container{
        padding:20px;
      }

      .card{
        padding:30px 24px;
      }

      .title{
        font-size:26px;
      }

      .desc{
        font-size:16px;
      }

      .input{
        height:54px;
        font-size:16px;
      }

      .footer{
        flex-direction:column;
        align-items:stretch;
      }

      .btn,
      .backBtn{
        width:100%;
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="step">Step 1 of 2</div>

      <h1 class="title">What’s your name?</h1>

      <p class="desc">
        Enter your name before starting the English diagnostic. Your result page will show your name and today’s date.
      </p>

      <div class="inputWrap">
        <input
          class="input"
          type="text"
          placeholder="Enter your full name"
        />
      </div>

      <div class="footer">
        <button class="backBtn" type="button">Back</button>
        <button class="btn" type="button">Next</button>
      </div>
    </div>
  </div>
</body>
</html>
