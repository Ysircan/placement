<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highlight Incorrect Words</title>
  <style>
    :root {
      --page-bg: #d8d9de;
      --panel-bg: #e8e5df;
      --box-bg: #e3e3e3;
      --text: #111111;
      --muted: #5f6a78;
      --line: #111111;
      --yellow: #f4d54a;
      --hover: #ddd8c8;
      --selected: #f4d54a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .shell {
      width: 100%;
      max-width: 1100px;
      background: var(--panel-bg);
      border: 3px solid var(--line);
      border-radius: 28px;
      box-shadow: 10px 10px 0 var(--line);
      padding: 34px 34px 28px;
    }

    .title {
      margin: 0;
      font-size: 58px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 18px 0 28px;
      font-size: 22px;
      line-height: 1.5;
      color: var(--muted);
    }

    .audioCard,
    .textCard {
      background: var(--box-bg);
      border: 3px solid var(--line);
      border-radius: 26px;
      box-shadow: 8px 8px 0 var(--line);
    }

    .audioCard {
      padding: 24px 24px 20px;
      margin-bottom: 28px;
    }

    .audioNote {
      font-size: 18px;
      color: #5c6675;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .audioInner {
      background: #dddddd;
      border-radius: 999px;
      padding: 18px 20px;
    }

    audio {
      width: 100%;
      display: block;
    }

    .textCard {
      padding: 28px 30px;
    }

    .passage {
      font-size: 27px;
      line-height: 1.85;
      word-break: break-word;
    }

    .word {
      display: inline;
      cursor: pointer;
      border-radius: 12px;
      padding: 2px 4px;
      transition: background 0.15s ease;
    }

    .word:hover {
      background: var(--hover);
    }

    .word.selected {
      background: var(--selected);
    }

    .bottomBar {
      display: flex;
      justify-content: flex-end;
      margin-top: 28px;
    }

    .nextBtn {
      border: 3px solid var(--line);
      background: var(--yellow);
      color: var(--text);
      border-radius: 999px;
      padding: 16px 30px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 6px 6px 0 var(--line);
    }

    .nextBtn:hover {
      transform: translate(-1px, -1px);
    }

    .nextBtn:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--line);
    }

    @media (max-width: 900px) {
      .shell {
        padding: 24px 20px 22px;
      }

      .title {
        font-size: 42px;
      }

      .subtitle {
        font-size: 18px;
        margin: 14px 0 22px;
      }

      .passage {
        font-size: 22px;
        line-height: 1.9;
      }

      .nextBtn {
        font-size: 18px;
        padding: 14px 24px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px;
      }

      .title {
        font-size: 34px;
      }

      .subtitle {
        font-size: 16px;
      }

      .audioNote {
        font-size: 15px;
      }

      .passage {
        font-size: 18px;
        line-height: 1.95;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="title">Highlight Incorrect Words</h1>
    <p class="subtitle">
      Listen to the recording and click on the words in the transcript that are different from what you hear.
    </p>

    <div class="audioCard">
      <div class="audioNote">This audio can only be played 2 times. Remaining: 2</div>
      <div class="audioInner">
        <audio controls>
          <source src="/audio/hiw-demo.mp3" type="audio/mpeg" />
        </audio>
      </div>
    </div>

    <div class="textCard">
      <div class="passage" id="passage"></div>
    </div>

    <div class="bottomBar">
      <button class="nextBtn" id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const transcript = `In modern education, students are often encouraged to work technology in groups, because collaborative learning can improve communication skills and help them solve problems more carefully. However, teachers must still ensure that each student is assessed effectively and given opportunities to think independently.`;

    const passage = document.getElementById("passage");
    const nextBtn = document.getElementById("nextBtn");
    const selected = new Set();

    function renderPassage() {
      passage.innerHTML = "";
      const words = transcript.split(" ");

      words.forEach((word, index) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;

        if (selected.has(index)) {
          span.classList.add("selected");
        }

        span.addEventListener("click", () => {
          if (selected.has(index)) {
            selected.delete(index);
          } else {
            selected.add(index);
          }
          renderPassage();
        });

        passage.appendChild(span);

        if (index !== words.length - 1) {
          passage.appendChild(document.createTextNode(" "));
        }
      });
    }

    nextBtn.addEventListener("click", () => {
      alert("Next question");
    });

    renderPassage();
  </script>
</body>
</html>
